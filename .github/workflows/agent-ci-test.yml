name: agent-ci-test
on: [push, pull_request]
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Fix cache directory permissions
        run: sudo mkdir -p /home/runner/.cache /home/runner/go && sudo chown -R runner:runner /home/runner/.cache /home/runner/go

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version: '1.26'
          cache: true

      - name: Install system dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libicu-dev make gcc tmux lsof

      - name: Configure Git
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "ci@gastown.test"
          git config --global init.defaultBranch main
          git config --global safe.directory '*'

      - name: Install Dolt
        run: |
          curl -L https://github.com/dolthub/dolt/releases/latest/download/install.sh | sudo bash

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build
        run: make build

      - name: Test
        # No -race: race detector overhead causes timing-sensitive tests to
        # flake in Docker. GitHub CI (native runner) still runs with -race.
        # Skip TestNudgeLockConcurrency: goroutine scheduling test that
        # reliably passes locally and on GitHub but flakes in Docker containers.
        run: go test -short -timeout=10m -skip TestNudgeLockConcurrency ./...

      - name: Coverage check
        run: ./scripts/ci/verify.sh coverage
