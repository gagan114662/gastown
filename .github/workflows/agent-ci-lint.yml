name: agent-ci-lint
on: [push, pull_request]
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version: '1.26'
          cache: true
      - name: Install ICU4C development headers
        run: sudo apt-get update && sudo apt-get install -y libicu-dev
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - name: Lint
        run: ./scripts/ci/verify.sh lint
